<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Internet yo'q - FastTV</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #f2f2f7;
        color: #000;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background-color: #000;
          color: #fff;
        }
      }
      .icon {
        font-size: 64px;
        margin-bottom: 16px;
        animation: pulse 2s infinite;
      }
      h1 {
        font-size: 24px;
        margin-bottom: 8px;
      }
      p {
        font-size: 16px;
        color: #8e8e93;
        max-width: 80%;
      }
      .btn {
        margin-top: 24px;
        padding: 12px 24px;
        background-color: #007aff;
        color: #fff;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
      }
      .btn:active {
        opacity: 0.8;
        transform: scale(0.95);
      }
      @keyframes pulse {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
        100% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="icon">📡</div>
    <h1>Aloqa yo'qoldi</h1>
    <p>
      Iltimos, internetingizni tekshiring. FastTV tez orada yana ishlashda davom
      etadi.
    </p>
    <button class="btn" onclick="window.location.reload()">
      Qaytadan urinish
    </button>
  </body>
</html>
