    <script>
      // Barmoq bilan kattalashtirishni o'ldiradi
      document.addEventListener("gesturestart", function (e) {
        e.preventDefault();
      });
      // Ikki marta bosganda zoom bo'lishni o'ldiradi
      document.addEventListener(
        "dblclick",
        function (e) {
          e.preventDefault();
        },
        { passive: false },
      );
    </script>

  <body>
    <noscript
      >FastTV ishlashi uchun JavaScript yoqilgan bo'lishi shart.</noscript
    >

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // 🛠 SERVICE WORKER RO'YXATDAN O'TKAZISH
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          // Bu yerda biz o'zimiz yaratadigan 'sw.js' faylini ko'rsatamiz
          navigator.serviceWorker
            .register("/sw.js")
            .then((reg) => console.log("FastTV Engine: Online (Custom SW)"))
            .catch((err) =>
              console.log("SW yuklanmadi, lekin ilova ishlayveradi."),
            );
        });
      }
    </script>
  </body>
